name: Scrape pachi border data

on:
  schedule:
    - cron: "0 0 * * 1"  # 毎週月曜日 AM 9:00 JST (UTC 00:00)
  workflow_dispatch:
    inputs:
      month:
        description: '取得対象の月、複数はカンマ区切り (例: 2026-05,2026-06、空白の場合は自動)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scrape script
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            MONTHS=$(echo "${{ github.event.inputs.month }}" | tr ',' ' ')
            python scripts/scrape.py --month $MONTHS
          else
            python scripts/scrape.py
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add suggestions.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update suggestions.json"
            git push
          fi
